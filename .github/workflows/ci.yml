name: CI

on:
  push:
    branches: [main, 'cursor/**']
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: V1 - Claude Code/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: V1 - Claude Code/backend/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Pytest
        run: pytest -q --ignore=tests/test_performance.py --ignore=scripts

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: V1 - Claude Code/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: V1 - Claude Code/frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test -- --passWithNoTests --watchAll=false
      - name: Build
        run: npm run build
