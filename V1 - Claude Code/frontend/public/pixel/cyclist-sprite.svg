<svg xmlns="http://www.w3.org/2000/svg" width="64" height="32" viewBox="0 0 64 32" shape-rendering="crispEdges">
  <!-- Frame 1 -->
  <g transform="translate(0,0)">
    <!-- wheels -->
    <rect x="4" y="22" width="7" height="7" fill="#2b2b2b"/>
    <rect x="6" y="24" width="3" height="3" fill="#9e9e9e"/>
    <rect x="20" y="22" width="7" height="7" fill="#2b2b2b"/>
    <rect x="22" y="24" width="3" height="3" fill="#9e9e9e"/>
    <!-- frame -->
    <rect x="8" y="20" width="14" height="2" fill="#4caf50"/>
    <rect x="10" y="16" width="4" height="2" fill="#2b2b2b"/>
    <rect x="12" y="18" width="2" height="6" fill="#4caf50"/>
    <rect x="18" y="18" width="2" height="4" fill="#4caf50"/>
    <rect x="20" y="18" width="5" height="2" fill="#4caf50"/>
    <!-- rider -->
    <rect x="14" y="6" width="6" height="6" fill="#2b2b2b"/>
    <rect x="15" y="7" width="4" height="4" fill="#f2c9a0"/>
    <rect x="12" y="12" width="8" height="6" fill="#ff5252"/>
    <rect x="10" y="12" width="3" height="3" fill="#2b2b2b"/>
    <rect x="19" y="12" width="4" height="3" fill="#2b2b2b"/>
    <!-- legs -->
    <rect x="12" y="18" width="4" height="4" fill="#2b2b2b"/>
    <rect x="16" y="20" width="4" height="4" fill="#2b2b2b"/>
  </g>
  <!-- Frame 2 -->
  <g transform="translate(32,0)">
    <!-- wheels -->
    <rect x="4" y="22" width="7" height="7" fill="#2b2b2b"/>
    <rect x="6" y="24" width="3" height="3" fill="#9e9e9e"/>
    <rect x="20" y="22" width="7" height="7" fill="#2b2b2b"/>
    <rect x="22" y="24" width="3" height="3" fill="#9e9e9e"/>
    <!-- frame -->
    <rect x="8" y="20" width="14" height="2" fill="#4caf50"/>
    <rect x="10" y="16" width="4" height="2" fill="#2b2b2b"/>
    <rect x="12" y="18" width="2" height="6" fill="#4caf50"/>
    <rect x="18" y="18" width="2" height="4" fill="#4caf50"/>
    <rect x="20" y="18" width="5" height="2" fill="#4caf50"/>
    <!-- rider -->
    <rect x="14" y="6" width="6" height="6" fill="#2b2b2b"/>
    <rect x="15" y="7" width="4" height="4" fill="#f2c9a0"/>
    <rect x="12" y="12" width="8" height="6" fill="#ff5252"/>
    <rect x="10" y="12" width="3" height="3" fill="#2b2b2b"/>
    <rect x="19" y="12" width="4" height="3" fill="#2b2b2b"/>
    <!-- legs (swapped) -->
    <rect x="14" y="18" width="4" height="4" fill="#2b2b2b"/>
    <rect x="10" y="20" width="4" height="4" fill="#2b2b2b"/>
  </g>
</svg>
